[workspace]
resolver = "3"
members = [
    "tool/microkit",
    "initialiser",
]

[workspace.dependencies.sel4-capdl-initializer]
git = "https://github.com/au-ts/rust-sel4"
branch = "julia/compile-time-optimisation"
# path = "../rust-sel4/crates/sel4-capdl-initializer"

[workspace.dependencies.sel4-capdl-initializer-types]
# path = "../rust-sel4/crates/sel4-capdl-initializer/types"
git = "https://github.com/au-ts/rust-sel4"
branch = "julia/compile-time-optimisation"

[profile.release.package.microkit-tool]
strip = true

[profile.release.build-override]
opt-level = 2
